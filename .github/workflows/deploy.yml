name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FONT_VERSION: "3.2.1"

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    env:
      CC: x86_64-linux-musl-gcc
      CXX: x86_64-linux-musl-g++
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-g++
      RUSTC_LINKER: x86_64-linux-musl-g++

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake perl pkg-config libclang-dev musl-tools

      - name: Install musl cross-compiler
        run: |
          wget https://github.com/musl-cc/musl.cc/releases/latest/download/x86_64-linux-musl-cross.tgz
          tar xzf x86_64-linux-musl-cross.tgz -C /opt
          echo "/opt/x86_64-linux-musl-cross/bin/" >> $GITHUB_PATH

      - name: Setup Rust toolchain
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          key: bot-musl

      - name: Build bot
        env:
          V8_FROM_SOURCE: "1"
        run: cargo build -p bot --release --target x86_64-unknown-linux-musl

      - name: Download JetBrainsMono Nerd Font
        run: |
          mkdir -p fonts
          curl -fsSL -o /tmp/JetBrainsMono.zip \
            "https://github.com/ryanoasis/nerd-fonts/releases/download/v${FONT_VERSION}/JetBrainsMono.zip"
          unzip -q /tmp/JetBrainsMono.zip -d fonts
          rm -f /tmp/JetBrainsMono.zip

      - name: Prepare Docker context
        run: |
          cp target/x86_64-unknown-linux-musl/release/bot apps/bot/bot
          cp /etc/ssl/certs/ca-certificates.crt apps/bot/ca-certificates.crt
          cp -r fonts apps/bot/fonts

      - name: Short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Repo name
        id: repo
        run: echo "name=$(echo $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/bot
          file: ./apps/bot/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ steps.repo.outputs.name }}/bot:${{ github.ref_type == 'tag' && github.ref_name || steps.vars.outputs.short_sha }}
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || steps.vars.outputs.short_sha }}

      - name: Deploy
        if: ${{ github.event_name != 'pull_request' }}
        uses: deploys-app/deploys-action@v1
        with:
          project: ${{ secrets.DEPLOYS_PROJECT }}
          location: gke.cluster-rcf2
          name: ${{ secrets.DEPLOYS_DEPLOY_NAME_bot }}
          image: ghcr.io/${{ steps.repo.outputs.name }}/bot:${{ github.ref_type == 'tag' && github.ref_name || steps.vars.outputs.short_sha }}
        env:
          DEPLOYS_AUTH_USER: ${{ secrets.DEPLOYS_AUTH_USER }}
          DEPLOYS_AUTH_PASS: ${{ secrets.DEPLOYS_AUTH_PASS }}
