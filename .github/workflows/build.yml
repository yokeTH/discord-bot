name: Build

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FONT_VERSION: "3.2.1"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
      CC: x86_64-linux-musl-gcc
      CXX: x86_64-linux-musl-g++
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-g++
      RUSTC_LINKER: x86_64-linux-musl-g++

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake perl pkg-config libclang-dev musl-tools

      - name: Install musl cross-compiler
        run: |
          wget https://github.com/musl-cc/musl.cc/releases/latest/download/x86_64-linux-musl-cross.tgz
          tar xzf x86_64-linux-musl-cross.tgz -C /opt
          echo "/opt/x86_64-linux-musl-cross/bin/" >> $GITHUB_PATH

      - name: Setup Rust toolchain
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          key: bot-musl

      - name: Build bot
        run: cargo build -p bot --release --target x86_64-unknown-linux-musl

      - name: Download JetBrainsMono Nerd Font
        run: |
          mkdir -p fonts
          curl -fsSL -o /tmp/JetBrainsMono.zip \
            "https://github.com/ryanoasis/nerd-fonts/releases/download/v${FONT_VERSION}/JetBrainsMono.zip"
          unzip -q /tmp/JetBrainsMono.zip -d fonts
          rm -f /tmp/JetBrainsMono.zip

      - name: Prepare Docker context
        run: |
          cp target/x86_64-unknown-linux-musl/release/bot ./bot
          cp /etc/ssl/certs/ca-certificates.crt ./ca-certificates.crt

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: bot:ci
          build-args: |
            APP_VERSION=${{ github.sha }}
