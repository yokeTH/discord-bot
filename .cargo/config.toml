[env]
# Build against the committed .sqlx offline cache so no database is needed
# at compile time. Regenerate with `cargo sqlx prepare` (see Makefile).
# force = false: an explicit SQLX_OFFLINE in the shell still wins.
SQLX_OFFLINE = "true"

[net]
git-fetch-with-cli = true

[source.crates-io]
registry = "git://github.com/rust-lang/crates.io-index.git"

[package]
vcs = "none"
